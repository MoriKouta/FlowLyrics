name: Development portable build

on:
  push:
    branches:
      - develop/1.3.0
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish portable build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '1.3.0-dev.11'
          $publish = Join-Path $PWD 'publish'
          $package = Join-Path $PWD "FlowLyrics-v$version-win-x64-portable.zip"

          dotnet publish .\FlowLyrics.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o $publish `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishTrimmed=false `
            -p:DebugSymbols=false `
            -p:DebugType=None

          Get-ChildItem $publish -File | Where-Object Name -ne 'FlowLyrics.exe' | Remove-Item -Force
          Copy-Item README.md, README.ja.md, LICENSE, THIRD_PARTY_NOTICES.md $publish
          Compress-Archive -Path "$publish\*" -DestinationPath $package -CompressionLevel Optimal

      - name: Upload confirmation build
        uses: actions/upload-artifact@v4
        with:
          name: FlowLyrics-v1.3.0-dev.11-win-x64-portable
          path: FlowLyrics-v1.3.0-dev.11-win-x64-portable.zip
          if-no-files-found: error
          retention-days: 14
